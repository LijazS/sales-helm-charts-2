namespace: sales-test-ns

auth:
  image: kubectlandchill/auth:test
  replicas: 1
  port: 3000

customer:
  image: kubectlandchill/customer:test
  replicas: 1
  port: 3000

order:
  image: kubectlandchill/order:test
  replicas: 1
  port: 3000

invoice:
  image: kubectlandchill/invoice:test
  replicas: 1
  port: 3000

payment:
  image: kubectlandchill/payment:test
  replicas: 1
  port: 3000

frontend:
  image: kubectlandchill/sales-invoice-ui:test
  replicas: 1
  port: 3000
  servicePort: 8000

gateway:
  name: sales-gateway
  namespace: sales-gateway-ns

hpa:
  enabled: false  

resources:
  requests:
    cpu: "50m"
    memory: "128Mi"
  limits:
    cpu: "100m"
    memory: "256Mi"