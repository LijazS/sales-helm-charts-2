apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.notifications.name }}
  namespace: {{ .Values.namespaces.application }}
  labels:
    app: notification
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: notification-microservice
  template:
    metadata:
      labels:
        app: notification-microservice
    spec:
      containers:
        - name: notification-container
          image: {{ .Values.notifications.image.repository }}:{{ .Values.notifications.image.tag }}
          ports:
            - containerPort: {{ .Values.notifications.port }}
          envFrom:
            - secretRef:
                name: notification-secret
            - secretRef:
                name: backend-secret
            - configMapRef:
                name: {{  .Values.configmaps.backend.name }}
          resources:
            limits:
              cpu: {{ .Values.notifications.resources.limits.cpu }}
              memory: {{ .Values.notifications.resources.limits.memory }}
            requests:
              cpu: {{ .Values.notifications.resources.requests.cpu }}
              memory: {{ .Values.notifications.resources.requests.memory }}
          {{- if .Values.probes.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.notifications.probePath }}
              port: {{ .Values.notifications.port }}
            initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}

          readinessProbe:
            httpGet:
              path: {{ .Values.notifications.probePath }}
              port: {{ .Values.notifications.port }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}

          livenessProbe:
            httpGet:
              path: {{ .Values.notifications.probePath }}
              port: {{ .Values.notifications.port }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}

          {{- end }}