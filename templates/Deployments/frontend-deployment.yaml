apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.salesUi.name }}
  namespace: {{ .Values.namespaces.application }}
  labels:
    app: sales-ui 
spec:
  replicas: {{ .Values.salesUi.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: sales-ui
  template:
    metadata:
      labels:
        app: sales-ui
    spec:
      containers:
        - name: sales-ui-container
          image: {{ .Values.salesUi.image.repository }}:{{ .Values.salesUi.image.tag }}
          ports:
            - containerPort: {{ .Values.salesUi.port }}
          resources:
            requests:
              cpu: {{ .Values.salesUi.resources.requests.cpu }}
              memory: {{ .Values.salesUi.resources.requests.memory }}
            limits:
              cpu: {{ .Values.salesUi.resources.limits.cpu }}
              memory: {{ .Values.salesUi.resources.limits.memory }}
          envFrom:
            - secretRef:
                name: backend-secret
            - configMapRef:
                name: {{ .Values.configmaps.frontend.name }}
          {{- if .Values.probes.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.salesUi.probePath }}
              port: {{ .Values.salesUi.port }}
            initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}

          readinessProbe:
            httpGet:
              path: {{ .Values.salesUi.probePath }}
              port: {{ .Values.salesUi.port }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}

          livenessProbe:
            httpGet:
              path: {{ .Values.salesUi.probePath }}
              port: {{ .Values.salesUi.port }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}

          {{- end }}